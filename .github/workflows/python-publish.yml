# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    - name: Verify release tag matches package version
      run: |
        python - <<'PY'
        import os
        import pathlib
        import re

        tag = os.environ["GITHUB_REF_NAME"]
        expected = tag[1:] if tag.startswith("v") else tag
        version_match = re.search(r'^__version__ = "([^"]+)"', pathlib.Path("setup.py").read_text(), re.M)
        if version_match is None:
            raise SystemExit("Could not find package version in setup.py")

        version = version_match.group(1)
        if version != expected:
            raise SystemExit(f"Release tag {tag} does not match package version {version}")
        PY
    - name: Build package
      run: python -m build
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
